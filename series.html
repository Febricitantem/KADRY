<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Серия | Kadry</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --text: #111827;
      --muted: #64748b;
      --stroke: #e5e7eb;

      /* Единый формат кадра. Он должен совпадать с draw.js: W=1920, H=1080. */
      --kadry-canvas-w: 1920;
      --kadry-canvas-h: 1080;
      --kadry-canvas-ratio: 1920 / 1080;
      --kadry-series-preview-w: 960px;
    }

    /* Общая тема */
    html,body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif
    }

    /* Универсальная шапка как на каталоге/голосованиях */
    .site-header {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      padding: 10px 18px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--stroke);
      min-height: 65px;
    }
    .hslot {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: inherit;
      font-weight: 600;
    }
    .hslot:hover {
      background: #e5e7eb40;
    }
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .brand .above {
      font-size: 30px;
      font-weight: 800;
      transform: translateY(-18%);
    }
    .brand .below {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      transform: translateY(18%);
    }

    .wrap{max-width:1200px;margin:22px auto;padding:0 18px;}
    h1{font-size:36px;font-weight:800;margin:8px 0 18px;text-align:center}

    /* Экран показа кадра */
    .stage{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:12px;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
  padding:12px;
  box-sizing:border-box;
  width:min(100%, calc(var(--kadry-series-preview-w) + 24px));
  max-width:none;
  margin:0 auto;        /* центрируем карточку, чтобы не растягивалась на всю ширину */
}

    /* Рабочий формат кадра: 1920×1080. Блок может уменьшаться, но пропорция не меняется. */
.viewport {
    box-sizing:border-box;
    width: 100%;
    max-width: var(--kadry-series-preview-w);
    aspect-ratio: var(--kadry-canvas-ratio);
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin: 0 auto;
    position: relative;       /* нужно для абсолютного котика */
}

/* КАРТИНКА КАДРА */
.frame-img{
    display: block;
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain !important;   /* запрещаем геометрическое искажение кадра */
    object-position: center center;
    flex: 0 0 auto;
    transition: opacity .2s ease-out;
}
.frame-img.is-hidden{
    opacity: 0;
}

/* КОТИК-ПРЕЛОАДЕР ПО ЦЕНТРУ */
.frame-loader{
    position: absolute;
    inset: 0;
    margin: auto;
    max-width: 25%;
    max-height: 25%;
    pointer-events: none;
}


    /* Навигация по кадрам */
    .controls{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin:12px 0
    }
    .btn{
      padding:6px 10px;
      border:1px solid #d1d5db;
      border-radius:8px;
      background:#fff;
      cursor:pointer
    }
    .btn:disabled{
      opacity:.5;
      cursor:not-allowed
    }
    .pos{
      min-width:64px;
      text-align:center;
      font-weight:700
    }
    .author-line{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
      color:#64748b;
      font-size:14px;
      margin:-8px 0 14px;
      min-height:20px;
    }
    .frame-author-line{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
      color:#64748b;
      font-size:13px;
      margin:8px auto 0;
      min-height:20px;
    }

    .frame-reactions{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin:10px auto 2px;
      min-height:34px;
      color:#475569;
      font-size:14px;
    }
    .reaction-btn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border:1px solid #d1d5db;
      border-radius:999px;
      background:#fff;
      color:#0f172a;
      cursor:pointer;
      font:inherit;
      font-weight:800;
      line-height:1;
    }
    .reaction-btn:hover{
      background:#f8fafc;
      border-color:#94a3b8;
    }
    .reaction-btn.is-active{
      background:#e0f2fe;
      border-color:#38bdf8;
      color:#075985;
    }
    .reaction-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .reaction-hint{
      color:#64748b;
      font-size:12px;
    }
    .author-link{
      color:#0f172a;
      font-weight:700;
      text-decoration:none;
      cursor:pointer;
      position:relative;
      z-index:2;
      pointer-events:auto;
    }
    .author-link:hover{
      color:#2563eb;
      text-decoration:underline;
    }
    .author-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      min-width:0;
    }
    .author-avatar{
      width:28px;
      height:28px;
      min-width:28px;
      border-radius:8px;
      border:1px solid #cbd5e1;
      background:#e2e8f0;
      color:#334155;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      text-decoration:none;
      font-size:13px;
      font-weight:900;
      line-height:1;
      box-sizing:border-box;
    }
    .author-avatar img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }
    .author-avatar:hover{
      border-color:#94a3b8;
      box-shadow:0 2px 8px rgba(15,23,42,.14);
    }

    /* Низ страницы */
    .bottom{
      display:flex;
      gap:10px;
      justify-content:center;
      margin-top:8px
    }
    .primary{
      background:#2563eb;
      color:#fff;
      border-color:#2563eb
    }
    .danger{
      background:#ef4444;
      color:#fff;
      border-color:#ef4444
    }
    .danger:hover{
      filter:brightness(.95)
    }

    /* Описание и комментарии */
    .desc-box{
      margin:18px 0 8px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
      padding:14px
    }
    .desc-box h2{
      margin:0 0 8px;
      font-size:18px;
      font-weight:800
    }
        .desc-text{
      color:#334155;
      white-space:pre-wrap;
      min-height:3em; /* чтобы блок не прыгал при подмене текста */
    }


    .comments{
      margin:12px 0 30px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }
    .comments header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 14px;
      background:#f8fafc;
      border-bottom:1px solid #e5e7eb;
      color:#111827
    }
    .comments h3{
      margin:0;
      font-size:18px;
      font-weight:800
    }
    .comment-list{
      padding:10px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:380px;
      overflow-y:auto;
      scrollbar-gutter:stable;
    }
    .comment{
      position:relative;
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:8px 10px;
      display:grid;
      grid-template-columns:36px 1fr;
      column-gap:10px;
      align-items:start;
    }
    .comment-avatar{
      grid-column:1;
      grid-row:1 / span 2;
      width:34px;
      height:34px;
      min-width:34px;
      border-radius:10px;
      border:1px solid #cbd5e1;
      background:#e2e8f0;
      color:#334155;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      text-decoration:none;
      font-size:14px;
      font-weight:900;
      line-height:1;
      box-sizing:border-box;
    }
    .comment-avatar img{width:100%;height:100%;display:block;object-fit:cover;}
    .comment-avatar:hover{border-color:#94a3b8;box-shadow:0 2px 8px rgba(15,23,42,.14);}
    .comment .del-btn{
      position:absolute;
      top:6px;
      right:6px;
      border:none;
      background:transparent;
      border-radius:8px;
      width:20px;
      height:20px;
      cursor:pointer;
      line-height:20px;
      text-align:center;
      color:#94a3b8
    }
    .comment .del-btn:hover{
      color:#475569;
      transform:scale(1.05)
    }
    .comment .meta{
      grid-column:2;
      font-size:12px;
      color:#64748b;
      margin-bottom:6px;
      padding-right:24px;
    }
    .comment .body{
      grid-column:2;
      white-space:pre-wrap
    }
    .comment-form{
      padding:10px 14px;
      border-top:1px solid #e5e7eb;
      display:grid;
      grid-template-columns:1fr 140px;
      gap:10px
    }
    .comment-form input,
    .comment-form textarea{
      font:inherit;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:8px 10px
    }
    .comment-form textarea{
      min-height:60px;
      resize:vertical
    }
    .comment-form .btn{
      height:40px
    }

    /* Админ-видимость */
    .admin-only{display:none}
    .is-admin .admin-only{display:block}
  
    body.site-closed {
      overflow: hidden;
    }
    .site-closed-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(6px);
    }
    .site-closed-card {
      max-width: 420px;
      width: 100%;
      border-radius: 16px;
      background: #020617;
      color: #e5e7eb;
      border: 1px solid rgba(148,163,184,0.6);
      padding: 18px 18px 16px;
      box-shadow: 0 20px 40px rgba(15,23,42,0.8);
      font-size: 14px;
    }
    .site-closed-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .site-closed-text {
      font-size: 14px;
      color: #cbd5f5;
    }
</style>

</head>
<body>

  async function getKadryAuthState(){
    if (typeof window.kadryGetAuthState === 'function') {
      return await window.kadryGetAuthState();
    }
    try {
      var r = await supabase.auth.getSession();
      var user = r && r.data && r.data.session && r.data.session.user;
      return { user: user || null, profile: null, isAdmin: false };
    } catch (_) {
      return { user: null, profile: null, isAdmin: false };
    }
  }

  async function requireKadryAuth(message){
    if (typeof window.kadryRequireAuth === 'function') {
      return await window.kadryRequireAuth(message);
    }
    var state = await getKadryAuthState();
    return !!(state && state.user);
  }

  function displayNameFromAuth(state){
    var user = state && state.user;
    var profile = state && state.profile;
    var local = '';
    if (user && user.email && user.email.indexOf('@') !== -1) local = String(user.email).split('@')[0].toLowerCase();
    var display = profile && profile.display_name ? String(profile.display_name).trim() : '';
    if (display && (!local || display.toLowerCase() !== local)) return display;
    if (profile && profile.username && String(profile.username).trim()) return String(profile.username).trim();
    return 'Игрок';
  }

  async function checkSiteOpen(){
    try{
      const { data, error } = await supabase
        .from('site_state')
        .select('is_open, announcement')
        .limit(1)
        .single();
      if(error){
        console.warn('site_state load error', error);
        return;
      }
      const open = data && data.is_open !== false;

      // Админ может продолжать работу, даже если сайт закрыт для гостей
      let adminBypass = false;
      try{
        if(!open && typeof window.isAdmin === 'function'){
          adminBypass = await window.isAdmin();
        }
      }catch(e){
        console.warn('isAdmin check in checkSiteOpen failed', e);
      }

      const overlay  = document.getElementById('site-closed-overlay');
      const messageEl = document.getElementById('site-closed-message');

      if(!open && !adminBypass){
        if(overlay){
          if(messageEl){
            messageEl.textContent =
              (data && data.announcement) ||
              'Онлайн сейчас закрыт. Попробуйте зайти позже.';
          }
          overlay.style.display = 'flex';
          document.body.classList.add('site-closed');
        }
      }else{
        if(overlay){
          overlay.style.display = 'none';
          document.body.classList.remove('site-closed');
        }
      }
    }catch(e){
      console.warn('checkSiteOpen failed', e);
    }
  }

// --- анимация "Загрузка..." в заголовке ---
var titleLoadingTimer = null;

function startTitleLoading() {
  if (!titleEl) return;
  var dots = 0;
  titleEl.textContent = 'Загрузка серии';
  titleLoadingTimer = setInterval(function () {
    dots = (dots + 1) % 4; // 0,1,2,3
    var tail = dots ? '.'.repeat(dots) : '';
    titleEl.textContent = 'Загрузка серии' + tail;
  }, 500);
}

function stopTitleLoading() {
  if (titleLoadingTimer) {
    clearInterval(titleLoadingTimer);
    titleLoadingTimer = null;
  }
}

// запускаем анимацию ТЕПЕРЬ, когда titleEl уже найден

function syncAdminUI(){
  var adminBars = document.querySelectorAll('.admin-only');
  adminBars.forEach(function (el) {
    el.style.display = isAdmin ? '' : 'none';
  });
}


  // Фразы-заглушки для пустого описания (НЕ сохраняются в БД — только отображаются)

    if(profile){
      if(profile.display_name && String(profile.display_name).trim()) return String(profile.display_name).trim();
      if(profile.username && String(profile.username).trim()) return String(profile.username).trim();

  function authorInitial(profile, fallback){
    var name = compactAuthorName(profile, fallback || 'Автор');
    return String(name || 'А').trim().charAt(0).toUpperCase() || 'А';
  }

  function authorAvatarNode(userId, fallback, className){
    var profile = userId ? profileCache[userId] : null;
    var name = compactAuthorName(profile, fallback || 'Автор');
    var node = userId ? document.createElement('a') : document.createElement('span');
    node.className = className || 'author-avatar';
    if(userId){
      node.href = makeProfileHref(userId);
      node.title = 'Открыть профиль ' + name;
      node.setAttribute('aria-label', 'Открыть профиль ' + name);
      node.addEventListener('click', function(e){ forceProfileOpen(e, userId); });
    }else{
      node.title = name;
    }

    var url = profile && profile.avatar_url ? String(profile.avatar_url).trim() : '';
    if(url){
      var img = document.createElement('img');
      img.src = url;
      img.alt = name;
      node.appendChild(img);
    }else{
      node.textContent = authorInitial(profile, fallback);
    }
    return node;
  }

  function normalizeProfileLink(value){
    return String(value || '').trim().toLowerCase();
  }

  function isValidProfileLink(value){
    return /^[a-z][a-z0-9]{2,31}$/.test(normalizeProfileLink(value));
  }

  function makeProfileHref(userId){
    var profile = userId ? profileCache[userId] : null;
    var username = normalizeProfileLink(profile && profile.username);
    if(username && isValidProfileLink(username)) return 'profile.html?u=' + encodeURIComponent(username);
    return 'profile.html?id=' + encodeURIComponent(userId);
  }

  function forceProfileOpen(e, userId){
    if(e){ e.preventDefault(); e.stopPropagation(); }
    if(userId) window.location.href = makeProfileHref(userId);
  }

  function emptyReactionCounts(){
    return { likes_count: 0, dislikes_count: 0 };
  }

  function normalizeReactionCounts(row){
    return {
      likes_count: Number(row && row.likes_count ? row.likes_count : 0) || 0,
      dislikes_count: Number(row && row.dislikes_count ? row.dislikes_count : 0) || 0
    };
  }

  async function loadFrameReactions(frameIds){
    frameIds = Array.from(new Set((frameIds || []).filter(Boolean)));
    reactionCounts = {};
    myReactions = {};
    if(!frameIds.length) return;

    var token = ++reactionLoadToken;

    try{
      var countsRes = await supabase
        .from('frame_reaction_counts')
        .select('frame_id,likes_count,dislikes_count')
        .in('frame_id', frameIds);
      if(countsRes.error){
        console.warn('frame_reaction_counts load error', countsRes.error);
      }else{
        (countsRes.data || []).forEach(function(row){
          reactionCounts[row.frame_id] = normalizeReactionCounts(row);
        });
      }
    }catch(e){
      console.warn('frame_reaction_counts load failed', e);
    }

    try{
      var state = await getKadryAuthState();
      var user = state && state.user;
      if(user && user.id){
        var myRes = await supabase
          .from('frame_my_reactions')
          .select('frame_id,value')
          .in('frame_id', frameIds);
        if(myRes.error){
          console.warn('frame_my_reactions load error', myRes.error);
        }else{
          (myRes.data || []).forEach(function(row){
            myReactions[row.frame_id] = Number(row.value) || 0;
          });
        }
      }
    }catch(e){
      console.warn('frame_my_reactions load failed', e);
    }

    if(token === reactionLoadToken && committedFrames[current]){
      renderFrameReactions(committedFrames[current]);
    }
  }

  function renderFrameReactions(frame){
    if(!reactionsEl) return;
    reactionsEl.textContent = '';

    if(!frame || !frame.id){
      return;
    }

    var counts = reactionCounts[frame.id] || emptyReactionCounts();
    var currentValue = myReactions[frame.id] || 0;

    var likeBtn = document.createElement('button');
    likeBtn.type = 'button';
    likeBtn.className = 'reaction-btn' + (currentValue === 1 ? ' is-active' : '');
    likeBtn.title = currentValue === 1 ? 'Снять лайк' : 'Поставить лайк';
    likeBtn.setAttribute('aria-pressed', currentValue === 1 ? 'true' : 'false');
    likeBtn.innerHTML = '<span aria-hidden="true">▲</span><span>' + counts.likes_count + '</span>';
    likeBtn.addEventListener('click', function(){ setFrameReaction(frame.id, 1); });

    var dislikeBtn = document.createElement('button');
    dislikeBtn.type = 'button';
    dislikeBtn.className = 'reaction-btn' + (currentValue === -1 ? ' is-active' : '');
    dislikeBtn.title = currentValue === -1 ? 'Снять дизлайк' : 'Поставить дизлайк';
    dislikeBtn.setAttribute('aria-pressed', currentValue === -1 ? 'true' : 'false');
    dislikeBtn.innerHTML = '<span aria-hidden="true">▼</span><span>' + counts.dislikes_count + '</span>';
    dislikeBtn.addEventListener('click', function(){ setFrameReaction(frame.id, -1); });

    reactionsEl.appendChild(likeBtn);
    reactionsEl.appendChild(dislikeBtn);

    if(!currentValue){
      var hint = document.createElement('span');
      hint.className = 'reaction-hint';
      hint.textContent = 'Оценка кадра';
      reactionsEl.appendChild(hint);
    }
  }

  async function setFrameReaction(frameId, value){
    var ok = await requireKadryAuth('Войдите, чтобы оценивать кадры.');
    if(!ok) return;

    if(!frameId || (value !== 1 && value !== -1)) return;

    var buttons = reactionsEl ? reactionsEl.querySelectorAll('.reaction-btn') : [];
    buttons.forEach(function(btn){ btn.disabled = true; });

    try{
      var res = await supabase.rpc('kadry_set_frame_reaction', {
        p_frame_id: frameId,
        p_value: value
      });

      if(res.error){
        console.error('kadry_set_frame_reaction error', res.error);
        alert(res.error.message || 'Не удалось сохранить оценку.');
        return;
      }

      var row = Array.isArray(res.data) ? res.data[0] : res.data;
      if(row){
        reactionCounts[frameId] = normalizeReactionCounts(row);
        myReactions[frameId] = Number(row.my_value) || 0;
      }else{
        await loadFrameReactions([frameId]);
      }
      renderFrameReactions(committedFrames[current]);
    }catch(e){
      console.error('setFrameReaction failed', e);
      alert('Не удалось сохранить оценку.');
    }finally{
      buttons.forEach(function(btn){ btn.disabled = false; });
    }
  }

  var signedCache = new Map();
  function getDisplayUrl(storedUrl){
    return new Promise(function(resolve){
      try{
        if(!storedUrl){ resolve(storedUrl); return; }
        if(/^data:/.test(storedUrl)){ resolve(storedUrl); return; }
        if((storedUrl.indexOf('http://')===0 || storedUrl.indexOf('https://')===0) && storedUrl.indexOf('/storage/v1/object/')===-1){ resolve(storedUrl); return; }
        if(storedUrl.indexOf('/storage/v1/object/public/Frames/')!==-1){ resolve(storedUrl); return; }
        if(storedUrl.indexOf('token=')!==-1){ resolve(storedUrl); return; }
        if(signedCache.has(storedUrl)){ resolve(signedCache.get(storedUrl)); return; }
        var m = storedUrl.match(/(?:Frames|frames)\/([^?]+)(?:\?|$)/);
        var key = m && m[1] ? m[1] : null;
        if(!key){
          var pure = storedUrl.split('?')[0];
          var tail = pure.split('/').pop();
          if(tail && pure.indexOf('.supabase.')===-1) key = decodeURIComponent(tail);
        }
        if(!key){ resolve(storedUrl); return; }
        var last = key.split('/').pop();
        var candidates = [key,'public/'+key,last,'public/'+last];
        (function tryNext(i){
          if(i>=candidates.length){
            var pub1 = supabase.storage.from('Frames').getPublicUrl(key);
            if(pub1 && pub1.data && pub1.data.publicUrl){ resolve(pub1.data.publicUrl); return; }
            resolve(storedUrl); return;
          }
          supabase.storage.from('Frames').createSignedUrl(candidates[i],3600)
            .then(function(r){
              if(!r.error && r.data && r.data.signedUrl){ signedCache.set(storedUrl,r.data.signedUrl); resolve(r.data.signedUrl); }
              else tryNext(i+1);
            })
            .catch(function(){ tryNext(i+1); });
        })(0);
      }catch(e){ console.warn('getDisplayUrl error',e); resolve(storedUrl); }
    });
  }

  function fmtPos(){ return (current+1)+' / '+committedFrames.length; }

   function renderStage(){
    if(!committedFrames.length){
      if (imgEl) {
        imgEl.removeAttribute('src');
        imgEl.classList.add('is-hidden');
      }
      if (loaderEl) {
        loaderEl.style.display = 'none';
      }
      if (frameAuthorEl) frameAuthorEl.textContent = '';
      renderFrameReactions(null);
      posEl.textContent = 'Кадров пока нет';
      firstBtn.disabled = prevBtn.disabled = true;
      nextBtn.disabled  = lastBtn.disabled  = true;
      return Promise.resolve();
    }

    var frame = committedFrames[current];
    renderAuthorLink(frameAuthorEl, 'Кадр: ', frame.created_by, frame.created_by ? 'Автор' : 'Старый кадр без автора');
    renderFrameReactions(frame);

    // Перед началом загрузки кадра показываем котика и прячем картинку
    if (loaderEl) {
      loaderEl.style.display = 'block';
    }
    if (imgEl) {
      imgEl.classList.add('is-hidden');
    }

    return getDisplayUrl(frame.image_url).then(function(url){
      imgEl.onload = function(){
        imgEl.classList.remove('is-hidden');
        if (loaderEl) loaderEl.style.display = 'none';
      };
      imgEl.onerror = function(){
        try{
          var tail = (frame.image_url||'').split('?')[0].split('/').pop();
          if(tail){
            var pub = supabase.storage.from('Frames').getPublicUrl(tail);
            if(pub && pub.data && pub.data.publicUrl){ imgEl.src = pub.data.publicUrl; return; }
            var pub2 = supabase.storage.from('Frames').getPublicUrl('public/'+tail);
            if(pub2 && pub2.data && pub2.data.publicUrl){ imgEl.src = pub2.data.publicUrl; return; }
          }
        }catch(_){}
        // если даже fallback не сработал, можно спрятать котика
        if (loaderEl) loaderEl.style.display = 'none';
      };

      imgEl.src = url;
      posEl.textContent = fmtPos();
      firstBtn.disabled = prevBtn.disabled = (current<=0);
      nextBtn.disabled  = lastBtn.disabled  = (current>=committedFrames.length-1);
    });
  }


  async function loadSeries(){
    try{
      const r = await supabase
        .from('series')
        .select('title, description, created_by')
        .eq('id', seriesId)
        .maybeSingle();

      stopTitleLoading();

      if(r.error){
        console.error('series load error', r.error);

      if(!s){

        return;
      }

      titleEl.textContent = s.title || 'Серия';
      await loadPublicProfiles([s.created_by]);
      renderAuthorLink(seriesAuthorEl, 'Начал: ', s.created_by, s.created_by ? 'Автор' : 'Старые данные без автора');

      if (s.description && s.description.trim()) {
        activePlaceholder = null;
        descEl.textContent = s.description;
        descInput.value = s.description;
        descInput.defaultValue = s.description;
      } else {

        ];
        descEl.textContent = activePlaceholder;
        descInput.value = '';
        descInput.defaultValue = '';
      }

      syncAdminUI();

      const fr = await supabase
        .from('frames')
        .select('id,image_url,order_index,committed,in_vote,created_by')
        .eq('series_id', seriesId)
        .eq('committed', true)
        .eq('history', false)
        .order('order_index', { ascending:true, nullsFirst:false })
        .order('id', { ascending:true });

      if(fr && fr.error){
        console.error('frames load error', fr.error);
      }
      committedFrames = (fr && fr.data) ? fr.data : [];
      current = Math.max(0, committedFrames.length - 1);
      await loadPublicProfiles(committedFrames.map(function(f){ return f.created_by; }));
      await loadFrameReactions(committedFrames.map(function(f){ return f.id; }));
      await renderStage();
      loadComments(true);
    }catch(e){
      stopTitleLoading();
      console.error('loadSeries fatal', e);
      if (titleEl && (!titleEl.textContent || titleEl.textContent.startsWith('Загрузка'))) {
        titleEl.textContent = 'Серия';
      }
    }
  }

  // Удаление серии + медиа из бакета — только админ
  function extractStorageKeys(url){
    var keys=[]; if(!url) return keys;
    try{
      var m=url.match(/\/storage\/v1\/object\/(?:public\/)?(Frames\/.+?)(?:\?.*)?$/);
      if(m && m[1]){ var k=m[1].replace(/^Frames\//,''); keys.push(k); keys.push('public/'+k); }
      else { var tail=url.split('?')[0].split('/').pop(); if(tail){ keys.push(tail); keys.push('public/'+tail); } }
    }catch(_){ }
    return Array.from(new Set(keys));
  }

      });
  });

  // Стартовая загрузка
  loadSeries().then(syncAdminUI);
})();
</script>
