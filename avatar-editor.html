<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kadry — Аватар</title>
  <style>
    :root{
      --bg:#f4f4f5;--text:#0f172a;--muted:#64748b;--card:#fff;--stroke:#e5e7eb;--blue:#2563eb;--danger:#b91c1c;
      --kadry-canvas-w:600;--kadry-canvas-h:600;--kadry-canvas-ratio:600 / 600;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;overflow:hidden;}
    .site-header{position:relative;display:grid;grid-template-columns:repeat(4,1fr);align-items:center;padding:4px 14px 6px;background:#f8fafc;border-bottom:1px solid var(--stroke);min-height:58px;}
    .hslot{display:flex;align-items:center;justify-content:center;text-decoration:none;color:inherit;font-weight:600;min-width:0;}
    .hslot:hover{background:#e5e7eb40;}
    .brand{display:flex;flex-direction:column;align-items:center;line-height:1;}
    .brand .above{font-size:30px;font-weight:800;transform:translateY(-18%);}
    .brand .below{font-size:14px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;transform:translateY(18%);}
    .wrap{height:calc(100% - 69px);display:flex;min-height:0;}
    .side{width:280px;min-width:280px;border-right:1px solid var(--stroke);background:#fff;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px;box-sizing:border-box;}
    .stage{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
    .panel{background:#f8fafc;border:1px solid var(--stroke);border-radius:10px;padding:10px;}
    .panel-title{font-weight:800;margin-bottom:8px;font-size:14px;}
    .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .col{display:flex;flex-direction:column;gap:8px;width:100%;}
    .btn{padding:7px 11px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;font:inherit;font-weight:700;text-decoration:none;color:inherit;}
    .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
    .btn:disabled{opacity:.6;cursor:not-allowed;}
    .muted{font-size:13px;color:var(--muted);line-height:1.35;}
    .danger{color:var(--danger);}
    #layerList{max-height:260px;overflow-y:auto;padding-right:4px;}
    .topbar{display:flex;align-items:center;gap:14px;padding:8px 16px;background:#fff;border-bottom:1px solid var(--stroke);flex-wrap:wrap;}
    .topbar label{font-size:13px;color:#334155;display:flex;align-items:center;gap:6px;}
    .slider-value{font-size:12px;color:#64748b;min-width:34px;display:inline-block;text-align:right;}
    .canvas-holder{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:12px;gap:12px;min-height:0;}
    #canvasWrap{position:relative;background:#fff;border:1px solid #d1d5db;box-sizing:border-box;width:min(72vh,72vw);max-width:calc(100% - 290px);height:auto;aspect-ratio:var(--kadry-canvas-ratio);flex:0 0 auto;box-shadow:0 1px 3px rgba(15,23,42,.12);}
    .color-preview{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:999px;border:3px solid rgba(15,23,42,.8);box-shadow:0 4px 16px rgba(15,23,42,.35);background:#000;opacity:0;pointer-events:none;transition:opacity .12s ease-out;z-index:9999;}
    body.eyedropper-active #canvasWrap{cursor:crosshair;}
    body.eyedropper-active .color-preview{opacity:0!important;}
    .color-sidebar{width:250px;max-width:250px;flex:0 0 auto;background:#f9fafb;border:1px solid var(--stroke);border-radius:10px;padding:10px 10px 12px;display:flex;flex-direction:column;gap:10px;box-sizing:border-box;}
    .color-wheel-wrap{position:relative;display:flex;justify-content:center;align-items:center;}
    #colorWheel{max-width:100%;height:auto;display:block;}
    .color-sliders{display:flex;flex-direction:column;gap:6px;}
    .color-slider-row{display:flex;align-items:center;gap:6px;font-size:12px;color:#374151;}
    .color-slider-row span{width:14px;text-align:right;}
    .color-slider-row input[type=range]{width:100%;}
    .color-slider-track{flex:1;display:flex;align-items:center;border-radius:999px;min-height:18px;padding:0 4px;background:#e5e7eb;}
    .color-history{display:flex;gap:8px;justify-content:center;}
    .color-history-col{display:flex;gap:6px;}
    .color-history-swatch{width:20px;height:20px;border:1px solid #cbd5e1;border-radius:999px;background:#fff;cursor:pointer;}
    .bottombar{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;background:#fff;border-top:1px solid var(--stroke);}
    .status{min-height:18px;font-size:13px;color:#475569;}
    .status.error{color:var(--danger);}
    @media(max-width:900px){html,body{overflow:auto}.wrap{height:auto;min-height:calc(100vh - 69px);flex-direction:column}.side{width:100%;min-width:0;max-height:none;border-right:0;border-bottom:1px solid var(--stroke)}.canvas-holder{flex-direction:column;overflow:visible}#canvasWrap{width:min(92vw,600px);max-width:92vw}.color-sidebar{width:min(92vw,600px);max-width:92vw}.site-header{grid-template-columns:1fr 1fr}.topbar{align-items:flex-start}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="admin.js"></script>
  <script src="draw.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="hslot h1" href="profile.html"><div class="brand"><div class="above">Аватар</div><div class="below">Kadry</div></div></a>
    <a class="hslot h2" href="index.html">Каталог</a>
    <a class="hslot h3" href="votes.html">Голосования</a>
    <a class="hslot h4" id="profileLink" href="profile.html">Профиль</a>
  </header>

  <div class="wrap">
    <aside class="side">
      <a id="backProfile" href="profile.html" class="btn">← Вернуться в профиль</a>
      <div class="panel">
        <div class="panel-title">Аватар 600×600</div>
        <div class="muted">Старая аватарка удаляется только после успешной загрузки и сохранения новой. Если выйти без сохранения, текущий аватар не изменится.</div>
      </div>
      <div class="panel">
        <div class="panel-title">Инструменты слоя</div>
        <div class="col">
          <input id="layerOpacity" name="layerOpacity" type="range" min="0" max="1" step="0.01" value="1" title="Непрозрачность выбранного слоя" style="width:100%" />
          <div class="row" style="justify-content:space-between;">
            <button id="addLayerBtn" class="btn" title="Добавить слой">＋</button>
            <div class="row">
              <button id="clearBtn" class="btn" title="Очистить слой">×</button>
              <button id="delLayerBtn" class="btn danger" title="Удалить слой">✖</button>
            </div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Слои</div>
        <div id="layerList"></div>
      </div>
      <div class="panel">
        <div class="panel-title">Референс слой</div>
        <div class="row">
          <input type="file" id="refInput" name="refInput" accept="image/*" class="btn" />
          <button id="addRefBtn" class="btn">Добавить</button>
        </div>
        <div class="muted">Референс не попадёт в сохранённую PNG.</div>
      </div>
      <div id="saveStatus" class="status"></div>
    </aside>

    <main class="stage">
      <div class="topbar">
        <input id="brushColor" name="brushColor" type="hidden" value="#000000" />
        <label>Толщина <span id="brushSizeValue" class="slider-value">0%</span><input id="brushSize" name="brushSize" type="range" min="1" max="60" value="8" /></label>
        <label>Прозрачность <span id="brushAlphaValue" class="slider-value">100%</span><input id="brushAlpha" name="brushAlpha" type="range" min="0" max="1" step="0.01" value="1" /></label>
        <label>Сглаживание <span id="brushSmoothValue" class="slider-value">0%</span><input id="brushSmooth" name="brushSmooth" type="range" min="0" max="100" step="1" value="0" /></label>
        <label>Инструмент
          <select id="toolSel" name="toolSel">
            <option value="brush">Кисть</option>
            <option value="eraser">Ластик</option>
            <option value="fill">Заливка</option>
            <option value="select">Выделение</option>
            <option value="zoom">Лупа</option>
            <option value="eyedropper">Пипетка</option>
          </select>
        </label>
        <button id="saveAvatarBtn" class="btn primary" type="button">Сохранить аватар</button>
      </div>

      <div class="canvas-holder">
        <div id="canvasWrap" aria-label="Рабочий холст 600×600">
          <div id="colorPreview" class="color-preview" aria-hidden="true"></div>
        </div>
        <aside class="color-sidebar" aria-label="Палитра цветов">
          <div class="color-wheel-wrap"><canvas id="colorWheel" width="220" height="220"></canvas></div>
          <div class="color-sliders">
            <div class="color-slider-row"><span>H</span><div class="color-slider-track"><input id="hueSlider" type="range" min="0" max="360" value="0" /></div></div>
            <div class="color-slider-row"><span>S</span><div class="color-slider-track"><input id="satSlider" type="range" min="0" max="100" value="100" /></div></div>
            <div class="color-slider-row"><span>B</span><div class="color-slider-track"><input id="valSlider" type="range" min="0" max="100" value="100" /></div></div>
          </div>
          <div class="color-history" aria-label="История цветов">
            <div class="color-history-col">
              <button class="color-history-swatch" data-index="0"></button><button class="color-history-swatch" data-index="1"></button><button class="color-history-swatch" data-index="2"></button><button class="color-history-swatch" data-index="3"></button><button class="color-history-swatch" data-index="4"></button>
            </div>
            <div class="color-history-col">
              <button class="color-history-swatch" data-index="5"></button><button class="color-history-swatch" data-index="6"></button><button class="color-history-swatch" data-index="7"></button><button class="color-history-swatch" data-index="8"></button><button class="color-history-swatch" data-index="9"></button>
            </div>
          </div>
        </aside>
      </div>

      <div class="bottombar">
        <button id="confirmSelBtn" class="btn" title="Применить выделение" style="display:none">✔</button>
        <button id="undoBtn" class="btn" title="Отмена">⟵</button>
        <button id="redoBtn" class="btn" title="Повтор">⟶</button>
        <button id="cancelSelBtn" class="btn danger" title="Отменить выделение" style="display:none">✖</button>
      </div>
    </main>
  </div>

<script>
(function(){
  'use strict';

  const SUPABASE_URL = 'https://upanhirmxhfzpajvswoq.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwYW5oaXJteGhmenBhanZzd29xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY2NjIwNzcsImV4cCI6MjA3MjIzODA3N30.HhrccU3DfoLadflBmTxIDXJgrDQB3m2zLRX3vtRycGA';
  const sb = window.__supabaseClient || (window.__supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: 'kadry-auth' }
  }));

  const params = new URLSearchParams(location.search);
  const returnUrl = params.get('return') || 'profile.html';
  let saving = false;
  let unsaved = false;
  let currentUser = null;

  function el(id){ return document.getElementById(id); }
  function setStatus(text, isError){ const box = el('saveStatus'); if(box){ box.textContent = text || ''; box.classList.toggle('error', !!isError); } }
  function safeReturnUrl(){
    try{
      const u = new URL(returnUrl, location.href);
      if(u.origin === location.origin) return u.pathname.split('/').pop() + u.search + u.hash;
    }catch(_){}
    return 'profile.html';
  }
  function randomPart(){ return Math.random().toString(36).slice(2, 9); }
  function parseAvatarObjectName(url){
    const v = String(url || '').split('?')[0].split('#')[0];
    const m = v.match(/\/object\/(?:public|sign)\/Avatars\/(.+)$/);
    return m && m[1] ? decodeURIComponent(m[1]) : '';
  }
  async function getUser(){
    if(window.kadryGetAuthState){
      const state = await window.kadryGetAuthState();
      if(state && state.user) return state.user;
    }
    const r = await sb.auth.getUser();
    return r && r.data ? r.data.user : null;
  }
  async function requireUser(){
    currentUser = await getUser();
    if(!currentUser || !currentUser.id){
      alert('Войдите в аккаунт, чтобы сохранить аватар.');
      location.href = 'profile.html';
      return null;
    }
    return currentUser;
  }

  function markUnsaved(){ unsaved = true; }
  window.addEventListener('beforeunload', function(e){
    if(!unsaved || saving) return;
    e.preventDefault();
    e.returnValue = '';
  });

  async function saveAvatar(){
    if(saving) return;
    const user = await requireUser();
    if(!user) return;
    if(!window.drawAPI || typeof window.drawAPI.exportCompositeBlob !== 'function'){
      alert('Редактор ещё не готов.');
      return;
    }
    const btn = el('saveAvatarBtn');
    saving = true;
    if(btn){ btn.disabled = true; btn.textContent = 'Сохраняем…'; }
    setStatus('Готовим PNG…', false);

    let newObjectName = '';
    try{
      const oldRes = await sb
        .from('profiles')
        .select('id,avatar_url,avatar_object_name')
        .eq('id', user.id)
        .single();
      if(oldRes.error) throw new Error(oldRes.error.message || 'Не удалось прочитать профиль. Проверьте SQL-патч avatar_object_name.');
      const oldObjectName = oldRes.data && (oldRes.data.avatar_object_name || parseAvatarObjectName(oldRes.data.avatar_url));

      const blob = await window.drawAPI.exportCompositeBlob();
      if(!blob || !blob.size) throw new Error('Пустой экспорт аватарки.');

      const file = new File([blob], 'avatar.png', { type:'image/png' });
      newObjectName = user.id + '/' + Date.now() + '_' + randomPart() + '.png';
      setStatus('Загружаем аватар…', false);
      const upload = await sb.storage
        .from('Avatars')
        .upload(newObjectName, file, { contentType:'image/png', cacheControl:'3600', upsert:false });
      if(upload.error) throw new Error(upload.error.message || 'Не удалось загрузить файл в Avatars.');

      const pub = sb.storage.from('Avatars').getPublicUrl(newObjectName);
      const publicUrl = pub && pub.data && (pub.data.publicUrl || pub.data.publicURL);
      if(!publicUrl) throw new Error('Не удалось получить публичную ссылку аватара.');

      setStatus('Обновляем профиль…', false);
      const upd = await sb
        .from('profiles')
        .update({ avatar_url: publicUrl, avatar_object_name: newObjectName })
        .eq('id', user.id)
        .select('id,username,display_name,avatar_url,avatar_object_name')
        .single();
      if(upd.error){
        await sb.storage.from('Avatars').remove([newObjectName]).catch(function(){});
        throw new Error(upd.error.message || 'Не удалось обновить профиль.');
      }

      if(oldObjectName && oldObjectName !== newObjectName){
        setStatus('Удаляем старую аватарку…', false);
        let remove = await sb.storage.from('Avatars').remove([oldObjectName]);
        if(remove.error){
          await new Promise(function(resolve){ setTimeout(resolve, 700); });
          remove = await sb.storage.from('Avatars').remove([oldObjectName]);
        }
        if(remove.error){
          throw new Error('Новый аватар сохранён, но старый файл не удалился: ' + (remove.error.message || 'storage remove failed'));
        }
      }

      unsaved = false;
      setStatus('Аватар сохранён.', false);
      try{ window.dispatchEvent(new CustomEvent('kadry:auth-changed')); }catch(_){}
      location.replace(safeReturnUrl());
    }catch(e){
      console.error('[avatar-editor] save failed', e);
      setStatus((e && e.message) ? e.message : 'Не удалось сохранить аватар.', true);
      if(newObjectName){
        try{ await sb.storage.from('Avatars').remove([newObjectName]); }catch(_){}
      }
    }finally{
      saving = false;
      if(btn){ btn.disabled = false; btn.textContent = 'Сохранить аватар'; }
    }
  }

  async function init(){
    const user = await requireUser();
    if(!user) return;
    el('backProfile').href = safeReturnUrl();
    el('profileLink').href = safeReturnUrl();
    window.initDrawEditor({ canvasPreset:'avatar', allowCustomCanvas:true, canvasWidth:600, canvasHeight:600 });
    el('canvasWrap').addEventListener('pointerdown', markUnsaved, true);
    document.querySelectorAll('input,select,button').forEach(function(node){
      if(node.id === 'saveAvatarBtn') return;
      node.addEventListener('input', markUnsaved, true);
      node.addEventListener('change', markUnsaved, true);
    });
    el('saveAvatarBtn').addEventListener('click', saveAvatar);
    setStatus('', false);
  }

  init();
})();
</script>
</body>
</html>
